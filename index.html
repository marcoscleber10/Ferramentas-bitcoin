            searchPlaceholder: "Buscar ferramenta...",
            filters: { all: "Todos", lightning: "⚡ Lightning", hardware: "🔒 Hardware", multisig: "🔐 Multisig", opensource: "🖧 Open Source", onchain: "⛓️ On-chain", multichain: "🌐 Multi-chain" },
            noResults: "Nenhuma ferramenta encontrada 😢",
            darkMode: "🌙 Modo Escuro",
            lightMode: "☀️ Modo Claro"
        },
        en: {
            heroTitle: "Bitcoin Tools",
            heroSub: "Complete ecosystem · 2026",
            searchPlaceholder: "Search tool...",
            filters: { all: "All", lightning: "⚡ Lightning", hardware: "🔒 Hardware", multisig: "🔐 Multisig", opensource: "🖧 Open Source", onchain: "⛓️ On-chain", multichain: "🌐 Multi-chain" },
            noResults: "No tools found 😢",
            darkMode: "🌙 Dark Mode",
            lightMode: "☀️ Light Mode"
        },
        es: {
            heroTitle: "Herramientas de Bitcoin",
            heroSub: "Ecosistema completo · 2026",
            searchPlaceholder: "Buscar herramienta...",
            filters: { all: "Todos", lightning: "⚡ Lightning", hardware: "🔒 Hardware", multisig: "🔐 Multisig", opensource: "🖧 Open Source", onchain: "⛓️ On-chain", multichain: "🌐 Multi-chain" },
            noResults: "No se encontraron herramientas 😢",
            darkMode: "🌙 Modo Oscuro",
            lightMode: "☀️ Modo Claro"
        },
        ja: {
            heroTitle: "ビットコインツール",
            heroSub: "完全なエコシステム · 2026",
            searchPlaceholder: "ツールを検索...",
            filters: { all: "すべて", lightning: "⚡ ライトニング", hardware: "🔒 ハードウェア", multisig: "🔐 マルチシグ", opensource: "🖧 オープンソース", onchain: "⛓️ オンチェーン", multichain: "🌐 マルチチェーン" },
            noResults: "ツールが見つかりません 😢",
            darkMode: "🌙 ダークモード",
            lightMode: "☀️ ライトモード"
        }
    };

    let currentLang = "pt";
    let activeFilter = "all";
    let searchTerm = "";

    function t(key) {
        const keys = key.split('.');
        let val = translations[currentLang];
        for (let k of keys) val = val?.[k];
        return val || key;
    }

    function render() {
        const grid = document.getElementById("toolsGrid");
        if (!grid) return;

        let filtered = uniqueTools.filter(tool => {
            const matchSearch = searchTerm === "" || tool.name.toLowerCase().includes(searchTerm.toLowerCase());
            if (!matchSearch) return false;
            if (activeFilter === "all") return true;
            return tool.tags && tool.tags.includes(activeFilter);
        });

        const grouped = {};
        for (const tool of filtered) {
            if (!grouped[tool.category]) grouped[tool.category] = [];
            grouped[tool.category].push(tool);
        }

        if (Object.keys(grouped).length === 0) {
            grid.innerHTML = `<div class="no-results">${t('noResults')}</div>`;
            return;
        }

        let html = "";
        for (const [cat, tools] of Object.entries(grouped)) {
            html += `<div class="card">
                        <div class="card-header">
                            <h2>${cat} <span>${tools.length}</span></h2>
                        </div>
                        <div class="tools-list">`;
            for (const tool of tools) {
                const url = tool.url;
                const isPlaceholder = !url;
                const linkAttrs = isPlaceholder ? 'href="javascript:void(0)" class="tool-chip placeholder-link"' : `href="${url}" target="_blank" rel="noopener noreferrer" class="tool-chip"`;
                let badgesHtml = "";
                if (tool.tags) {
                    if (tool.tags.includes("popular")) badgesHtml += `<span class="badge popular">⭐ Popular</span>`;
                    if (tool.tags.includes("lightning")) badgesHtml += `<span class="badge lightning">⚡ Lightning</span>`;
                    if (tool.tags.includes("opensource")) badgesHtml += `<span class="badge opensource">🖧 Open Source</span>`;
                    if (tool.tags.includes("hardware")) badgesHtml += `<span class="badge hardware">🔒 Hardware</span>`;
                    if (tool.tags.includes("multisig")) badgesHtml += `<span class="badge multisig">🔐 Multisig</span>`;
                    if (tool.tags.includes("multichain")) badgesHtml += `<span class="badge multichain">🌐 Multi‑chain</span>`;
                }
                html += `<a ${linkAttrs}><span>₿</span> ${tool.name}<div class="badges">${badgesHtml}</div></a>`;
            }
            html += `</div></div>`;
        }
        grid.innerHTML = html;
        document.querySelectorAll('.placeholder-link').forEach(el => {
            el.setAttribute('title', 'Link oficial não disponível no momento');
        });
    }

    function updateUITexts() {
        document.getElementById("heroTitle").innerText = t('heroTitle');
        document.getElementById("heroSub").innerText = t('heroSub');
        const searchInput = document.getElementById("searchInput");
        if (searchInput) searchInput.placeholder = t('searchPlaceholder');

        const filterContainer = document.getElementById("filterTagsContainer");
        if (filterContainer) {
            const filters = [
                { id: "all", label: t('filters.all') },
                { id: "lightning", label: t('filters.lightning') },
                { id: "hardware", label: t('filters.hardware') },
                { id: "multisig", label: t('filters.multisig') },
                { id: "opensource", label: t('filters.opensource') },
                { id: "onchain", label: t('filters.onchain') },
                { id: "multichain", label: t('filters.multichain') }
            ];
            filterContainer.innerHTML = filters.map(f => 
                `<button class="filter-chip ${activeFilter === f.id ? 'active' : ''}" data-filter="${f.id}">${f.label}</button>`
            ).join('');
            document.querySelectorAll('.filter-chip').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    activeFilter = btn.getAttribute('data-filter');
                    render();
                    updateUITexts();
                });
            });
        }

        const toggleBtn = document.getElementById("darkModeToggle");
        if (toggleBtn) {
            const isDark = document.body.classList.contains('dark');
            toggleBtn.innerHTML = isDark ? t('lightMode') : t('darkMode');
        }

        render();
    }

    function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem("btcToolsLang", lang);
        updateUITexts();
        document.querySelectorAll('.lang-btn').forEach(btn => {
            if (btn.getAttribute('data-lang') === lang) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    function initDarkMode() {
        const stored = localStorage.getItem("btcToolsDark");
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = stored === "true" || (stored === null && prefersDark);
        if (isDark) document.body.classList.add('dark');
        else document.body.classList.remove('dark');

        const toggleBtn = document.getElementById("darkModeToggle");
        toggleBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            const nowDark = document.body.classList.contains('dark');
            localStorage.setItem("btcToolsDark", nowDark);
            updateUITexts();
        });
        updateUITexts();
    }

    function init() {
        const savedLang = localStorage.getItem("btcToolsLang") || "pt";
        setLanguage(savedLang);

        const searchInput = document.getElementById("searchInput");
        if (searchInput) {
            searchInput.addEventListener('input', (e) => {
                searchTerm = e.target.value;
                render();
            });
        }

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => setLanguage(btn.getAttribute('data-lang')));
        });

        initDarkMode();
        render();
    }

    init();
</script>
</body>
</html>
